<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Soluciones Locales</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{

background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#2563eb
);

color:white;

min-height:100vh;

}

.cardx{

background:white;

color:black;

border-radius:20px;

padding:20px;

margin-top:20px;

}

.perfil{

width:100px;

height:100px;

border-radius:50%;

object-fit:cover;

}

.galeria img{

width:100%;

height:120px;

object-fit:cover;

border-radius:10px;

}

</style>

</head>

<body>

<div class="container">

<h1 class="text-center mt-4">

🛠️ Soluciones Locales

</h1>

<div class="cardx">

<h4>Buscar</h4>

<select id="oficio"></select>

<select id="ciudad" class="mt-2"></select>

<button
onclick="buscar()"
class="btn btn-primary mt-3">

Buscar

</button>

</div>


<div class="cardx">

<h4>Publicar Servicio</h4>

<form id="form">

<input
name="nombre"
placeholder="Nombre"
class="form-control mb-2">

<input
name="apellido"
placeholder="Apellido"
class="form-control mb-2">

<input
name="email"
class="form-control mb-2">

<input
name="telefono"
class="form-control mb-2">

<select
name="ciudad"
id="ciudad2"
class="form-control mb-2">

</select>

<select
name="oficio"
id="oficio2"
class="form-control mb-2">

</select>

<textarea
name="descripcion"
class="form-control">

</textarea>

<label class="mt-3">

Foto Perfil

</label>

<input
type="file"
name="perfil"
class="form-control">

<label>

3 imágenes

</label>

<input
multiple
name="trabajos"
type="file"
class="form-control">

<button
class="btn btn-success mt-3">

Publicar

</button>

</form>

</div>

<div id="resultados"></div>

</div>

<script>

async function init(){

let o=
await fetch("/categorias")

o=
await o.json()

let c=
await fetch("/ciudades")

c=
await c.json()

for(let s of[
oficio,
oficio2
]){

s.innerHTML=
o.map(
x=>
`<option>${x}</option>`
)

}

for(let s of[
ciudad,
ciudad2
]){

s.innerHTML=
c.map(
x=>
`<option>${x}</option>`
)

}

}

async function buscar(){

let r=
await fetch(
`/buscar?oficio=${oficio.value}&ciudad=${ciudad.value}`
)

r=
await r.json()

resultados.innerHTML=""

r.forEach(x=>{

resultados.innerHTML+=`

<div class='cardx'>

<img
src='${x.perfil}'
class='perfil'>

<h3>

${x.nombre}

</h3>

<b>

${x.oficio}

</b>

<p>

${x.descripcion}

</p>

<p>

📞 ${x.telefono}

</p>

<div class='row galeria'>

${x.imagenes
.filter(i=>i)
.map(
i=>
`<div class='col'>
<img src='${i}'>
</div>`
).join("")}

</div>

</div>

`

})

}

form.onsubmit=
async e=>{

e.preventDefault()

let fd=
new FormData(form)

await fetch(
"/register",
{
method:"POST",
body:fd
}
)

alert(
"Publicado"
)

form.reset()

}

init()

</script>

</body>

</html>

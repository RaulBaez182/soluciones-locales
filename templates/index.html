<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soluciones Locales</title>
    <style>
        :root {
            --primary: #009688;
            --primary-dark: #00796B;
            --bg: #F5F7FA;
            --text: #333;
            --card-bg: #FFFFFF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #1A252F; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        /* Contenedor Vista Móvil Centrada */
        .phone-container {
            width: 100%;
            max-width: 420px;
            height: 95vh;
            background-color: var(--bg);
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            border-radius: 16px;
        }

        /* Barra Superior */
        .header {
            background-color: var(--primary);
            color: white;
            padding: 18px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            position: relative;
        }
        .back-btn {
            position: absolute;
            left: 15px;
            top: 18px;
            background: none;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            display: none;
        }

        /* Contenido de Pantallas */
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 80px; }
        .view { display: none; }
        .view.active { display: block; }

        /* Pantalla de Inicio (Home) */
        .home-logo-container { text-align: center; margin-top: 40px; margin-bottom: 50px; }
        .home-logo { font-size: 4.5rem; color: var(--primary); }
        .home-title { color: var(--primary); font-size: 1.8rem; margin-top: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .home-btn {
            display: block;
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            text-align: left;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .home-btn:active { background-color: var(--primary-dark); }

        /* Formularios y Selectores */
        .form-group { margin-bottom: 15px; }
        .form-control {
            width: 100%;
            padding: 14px;
            border: 1px solid #DADADA;
            border-radius: 8px;
            font-size: 1rem;
            background-color: white;
            outline: none;
        }
        .form-control:focus { border-color: var(--primary); }
        .btn-block {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Tarjetas de Profesionales */
        .worker-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border-left: 4px solid var(--primary);
        }
        .worker-img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; margin-right: 15px; background: #EEE; }
        .worker-info { flex: 1; }
        .worker-name { font-weight: bold; font-size: 1.1rem; color: #222; }
        .worker-job { color: var(--primary); font-size: 0.9rem; font-weight: 600; }
        .worker-city { color: #777; font-size: 0.85rem; margin-top: 2px; }

        /* Detalles del Perfil */
        .profile-header { text-align: center; margin-bottom: 20px; }
        .profile-main-img { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); background: #EEE; }
        .profile-name { font-size: 1.4rem; font-weight: bold; margin-top: 10px; }
        .profile-tag { display: inline-block; background: #E0F2F1; color: var(--primary-dark); padding: 5px 14px; border-radius: 20px; font-weight: bold; font-size: 0.85rem; margin-top: 5px; }
        .profile-body { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .profile-section-title { font-weight: bold; margin-bottom: 6px; color: #444; font-size: 0.95rem; text-transform: uppercase; }
        .profile-desc { color: #555; line-height: 1.5; margin-bottom: 20px; font-size: 0.95rem; }
        
        /* Botones de Contacto Telefónico */
        .contact-box { display: flex; gap: 10px; }
        .btn-contact { flex: 1; text-align: center; padding: 14px; border-radius: 8px; text-decoration: none; font-weight: bold; color: white; font-size: 0.95rem; }
        .btn-whatsapp { background-color: #25D366; }
        .btn-call { background-color: #007bff; }

        /* Barra de Menú Inferior Fija */
        .nav-bar {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 65px;
            background-color: white;
            border-top: 1px solid #EEE;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .nav-item { background: none; border: none; color: #999; font-size: 0.8rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; width: 33%; height: 100%; justify-content: center; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        .nav-icon { font-size: 1.3rem; margin-bottom: 2px; }
    </style>
</head>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soluciones Locales</title>
    <style>
        :root {
            --primary: #009688;
            --primary-dark: #00796B;
            --bg: #F5F7FA;
            --text: #333;
            --card-bg: #FFFFFF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #1A252F; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        /* Contenedor Vista Móvil Centrada */
        .phone-container {
            width: 100%;
            max-width: 420px;
            height: 95vh;
            background-color: var(--bg);
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            border-radius: 16px;
        }

        /* Barra Superior */
        .header {
            background-color: var(--primary);
            color: white;
            padding: 18px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            position: relative;
        }
        .back-btn {
            position: absolute;
            left: 15px;
            top: 18px;
            background: none;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            display: none;
        }

        /* Contenido de Pantallas */
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 80px; }
        .view { display: none; }
        .view.active { display: block; }

        /* Pantalla de Inicio (Home) */
        .home-logo-container { text-align: center; margin-top: 40px; margin-bottom: 50px; }
        .home-logo { font-size: 4.5rem; color: var(--primary); }
        .home-title { color: var(--primary); font-size: 1.8rem; margin-top: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .home-btn {
            display: block;
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            text-align: left;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .home-btn:active { background-color: var(--primary-dark); }

        /* Formularios y Selectores */
        .form-group { margin-bottom: 15px; }
        .form-control {
            width: 100%;
            padding: 14px;
            border: 1px solid #DADADA;
            border-radius: 8px;
            font-size: 1rem;
            background-color: white;
            outline: none;
        }
        .form-control:focus { border-color: var(--primary); }
        .btn-block {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Tarjetas de Profesionales */
        .worker-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border-left: 4px solid var(--primary);
        }
        .worker-img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; margin-right: 15px; background: #EEE; }
        .worker-info { flex: 1; }
        .worker-name { font-weight: bold; font-size: 1.1rem; color: #222; }
        .worker-job { color: var(--primary); font-size: 0.9rem; font-weight: 600; }
        .worker-city { color: #777; font-size: 0.85rem; margin-top: 2px; }

        /* Detalles del Perfil */
        .profile-header { text-align: center; margin-bottom: 20px; }
        .profile-main-img { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); background: #EEE; }
        .profile-name { font-size: 1.4rem; font-weight: bold; margin-top: 10px; }
        .profile-tag { display: inline-block; background: #E0F2F1; color: var(--primary-dark); padding: 5px 14px; border-radius: 20px; font-weight: bold; font-size: 0.85rem; margin-top: 5px; }
        .profile-body { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .profile-section-title { font-weight: bold; margin-bottom: 6px; color: #444; font-size: 0.95rem; text-transform: uppercase; }
        .profile-desc { color: #555; line-height: 1.5; margin-bottom: 20px; font-size: 0.95rem; }
        
        /* Botones de Contacto Telefónico */
        .contact-box { display: flex; gap: 10px; }
        .btn-contact { flex: 1; text-align: center; padding: 14px; border-radius: 8px; text-decoration: none; font-weight: bold; color: white; font-size: 0.95rem; }
        .btn-whatsapp { background-color: #25D366; }
        .btn-call { background-color: #007bff; }

        /* Barra de Menú Inferior Fija */
        .nav-bar {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 65px;
            background-color: white;
            border-top: 1px solid #EEE;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .nav-item { background: none; border: none; color: #999; font-size: 0.8rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; width: 33%; height: 100%; justify-content: center; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        .nav-icon { font-size: 1.3rem; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="header">
            <button class="back-btn" id="backBtn" onclick="goBack()">◀</button>
            <span id="headerTitle">Soluciones Locales</span>
        </div>

        <div class="content">
            
            <div id="view-home" class="view active">
                <div class="home-logo-container">
                    <div class="home-logo">🛠️</div>
                    <div class="home-title">Soluciones Locales</div>
                    <p style="color: #777; margin-top: 5px; font-size: 0.95rem;">Profesionales independientes cerca tuyo</p>
                </div>
                <button class="home-btn" onclick="navigateTo('view-buscar', 'Buscar Profesional')">
                    <span style="font-size: 1.3rem; display:block; margin-bottom: 3px;">🔍 Quiero Contratar</span>
                    <small style="font-weight: normal; color: #E0F2F1;">Encuentra electricistas, plomeros y albañiles</small>
                </button>
                <button class="home-btn" onclick="navigateTo('view-publicar', 'Ofrecer Servicios')">
                    <span style="font-size: 1.3rem; display:block; margin-bottom: 3px;">💼 Ofrecer mis Servicios</span>
                    <small style="font-weight: normal; color: #E0F2F1;">Regístrate gratis para recibir llamadas de trabajo</small>
                </button>
            </div>

            <div id="view-buscar" class="view">
                <div style="background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.02);">
                    <div class="form-group">
                        <select id="searchOficio" class="form-control">
                            <option value="">¿Qué oficio buscas? (Todos)</option>
                            <option value="Plomero">Plomero</option>
                            <option value="Electricista">Electricista</option>
                            <option value="Carpintero">Carpintero</option>
                            <option value="Pintor">Pintor</option>
                            <option value="Albañil">Albañil</option>
                            <option value="Mecánico">Mecánico</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <select id="searchCiudad" class="form-control">
                            <option value="">¿En qué ciudad? (Todas)</option>
                            <option value="Asunción">Asunción</option>
                            <option value="San Lorenzo">San Lorenzo</option>
                            <option value="Luque">Luque</option>
                            <option value="Lambaré">Lambaré</option>
                            <option value="Fernando de la Mora">Fernando de la Mora</option>
                            <option value="Capiatá">Capiatá</option>
                        </select>
                    </div>
                    <button class="btn-block" onclick="ejecutarBusqueda()">Filtrar Lista</button>
                </div>
                <div id="resultadosBusqueda"></div>
            </div>

            <div id="view-publicar" class="view">
                <form id="registerForm" onsubmit="registrarTrabajador(event)" style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.02);">
                    <div class="form-group"><input type="text" id="regNombre" class="form-control" placeholder="Nombre" required></div>
                    <div class="form-group"><input type="text" id="regApellido" class="form-control" placeholder="Apellido" required></div>
                    <div class="form-group"><input type="text" id="regTelefono" class="form-control" placeholder="Número de celular (Ej: 0981123456)" required></div>
                    <div class="form-group">
                        <select id="regCiudad" class="form-control">
                            <option value="Asunción">Asunción</option>
                            <option value="San Lorenzo">San Lorenzo</option>
                            <option value="Luque">Luque</option>
                            <option value="Lambaré">Lambaré</option>
                            <option value="Fernando de la Mora">Fernando de la Mora</option>
                            <option value="Capiatá">Capiatá</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <select id="regOficio" class="form-control">
                            <option value="Plomero">Plomero</option>
                            <option value="Electricista">Electricista</option>
                            <option value="Carpintero">Carpintero</option>
                            <option value="Pintor">Pintor</option>
                            <option value="Albañil">Albañil</option>
                            <option value="Mecánico">Mecánico</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <textarea id="regDescripcion" class="form-control" rows="4" placeholder="Describe qué trabajos realizas y tu zona de cobertura..." required></textarea>
                    </div>
                    <button type="submit" class="btn-block" style="background-color: var(--primary-dark);">Publicar Perfil Profesional</button>
                </form>
            </div>

            <div id="view-perfil" class="view">
                <div class="profile-header">
                    <img id="profImg" src="" class="profile-main-img">
                    <div id="profNombre" class="profile-name"></div>
                    <div id="profOficio" class="profile-tag"></div>
                </div>
                <div class="profile-body">
                    <div class="profile-section-title">📍 Ciudad Base</div>
                    <div id="profCiudad" style="color: #666; margin-bottom: 18px; font-size: 1rem;"></div>
                    
                    <div class="profile-section-title">📝 Experiencia y Servicios</div>
                    <p id="profDesc" class="profile-desc"></p>

                    <div class="contact-box">
                        <a id="btnWpp" href="#" target="_blank" class="btn-contact btn-whatsapp">💬 WhatsApp</a>
                        <a id="btnCall" href="#" class="btn-contact btn-call">📞 Llamar</a>
                    </div>
                </div>
            </div>

        </div>

        <div class="nav-bar">
            <button class="nav-item active" id="nav-home" onclick="navigateTo('view-home', 'Soluciones Locales')">
                <span class="nav-icon">🏠</span><span>Inicio</span>
            </button>
            <button class="nav-item" id="nav-buscar" onclick="navigateTo('view-buscar', 'Buscar Profesional')">
                <span class="nav-icon">🔍</span><span>Buscar</span>
            </button>
            <button class="nav-item" id="nav-publicar" onclick="navigateTo('view-publicar', 'Ofrecer Servicios')">
                <span class="nav-icon">➕</span><span>Publicar</span>
            </button>
        </div>
    </div>

    <script>
        let historialPantallas = ['view-home'];
        let historialTitulos = ['Soluciones Locales'];

        function navigateTo(viewId, title) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById(viewId).classList.add('active');
            document.getElementById('headerTitle').innerText = title;

            const backBtn = document.getElementById('backBtn');
            if (viewId === 'view-home') {
                backBtn.style.display = 'none';
                historialPantallas = ['view-home'];
                historialTitulos = ['Soluciones Locales'];
            } else {
                backBtn.style.display = 'block';
                if(historialPantallas[historialPantallas.length - 1] !== viewId) {
                    historialPantallas.push(viewId);
                    historialTitulos.push(title);
                }
            }

            const navIdMap = {'view-home': 'nav-home', 'view-buscar': 'nav-buscar', 'view-publicar': 'nav-publicar'};
            if (navIdMap[viewId]) {
                document.getElementById(navIdMap[viewId]).classList.add('active');
            }
            
            if (viewId === 'view-buscar') { ejecutarBusqueda(); }
        }

        function goBack() {
            if (historialPantallas.length > 1) {
                historialPantallas.pop();
                historialTitulos.pop();
                const prevView = historialPantallas[historialPantallas.length - 1];
                const prevTitle = historialTitulos[historialTitulos.length - 1];
                navigateTo(prevView, prevTitle);
                historialPantallas.pop();
                historialTitulos.pop();
            }
        }

        function ejecutarBusqueda() {
            const oficio = document.getElementById('searchOficio').value;
            const ciudad = document.getElementById('searchCiudad').value;
            
            fetch(`/buscar?oficio=${oficio}&ciudad=${ciudad}`)
                .then(res => res.json())
                .then(data => {
                    const contenedor = document.getElementById('resultadosBusqueda');
                    contenedor.innerHTML = '';
                    
                    if(data.length === 0) {
                        contenedor.innerHTML = '<p style="text-align:center; color:#888; margin-top:30px;">No se encontraron profesionales con estos filtros.</p>';
                        return;
                    }

                    data.forEach(worker => {
                        const card = document.createElement('div');
                        card.className = 'worker-card';
                        card.onclick = () => verPerfilCompleto(worker.id);
                        card.innerHTML = `
                            <img src="${worker.perfil_url}" class="worker-img">
                            <div class="worker-info">
                                <div class="worker-name">${worker.nombre} ${worker.apellido}</div>
                                <div class="worker-job">${worker.oficio}</div>
                                <div class="worker-city">📍 ${worker.ciudad}</div>
                            </div>
                        `;
                        contenedor.appendChild(card);
                    });
                });
        }

        function verPerfilCompleto(id) {
            fetch(`/perfil/${id}`)
                .then(res => res.json())
                .then(worker => {
                    if (worker.error) return;
                    document.getElementById('profImg').src = worker.perfil_url;
                    document.getElementById('profNombre').innerText = worker.nombre;
                    document.getElementById('profOficio').innerText = worker.oficio;
                    document.getElementById('profCiudad').innerText = worker.ciudad;
                    document.getElementById('profDesc').innerText = worker.descripcion || 'Sin descripción disponible.';
                    
                    let numLimpio = worker.telefono.trim();
                    if(numLimpio.startsWith('0')) numLimpio = numLimpio.substring(1);
                    
                    document.getElementById('btnWpp').href = `https://wa.me/595${numLimpio}`;
                    document.getElementById('btnCall').href = `tel:${worker.telefono}`;

                    navigateTo('view-perfil', 'Perfil Profesional');
                });
        }

        function registrarTrabajador(e) {
            e.preventDefault();
            const data = {
                nombre: document.getElementById('regNombre').value,
                apellido: document.getElementById('regApellido').value,
                telefono: document.getElementById('regTelefono').value,
                ciudad: document.getElementById('regCiudad').value,
                oficio: document.getElementById('regOficio').value,
                descripcion: document.getElementById('regDescripcion').value
            };

            fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(res => {
                if(res.ok) {
                    alert('¡Tu perfil profesional ha sido publicado con éxito!');
                    document.getElementById('registerForm').reset();
                    navigateTo('view-buscar', 'Buscar Profesional');
                }
            });
        }
    </script>
</body>
</html>

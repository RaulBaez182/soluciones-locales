<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soluciones Locales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3c72);
            color: white;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .hero {
            text-align: center;
            padding: 30px 20px;
        }

        .hero h2 {
            font-weight: 700;
        }

        .cardx {
            background: rgba(255, 255, 255, 0.95);
            color: #1e293b;
            border-radius: 20px;
            padding: 20px;
            margin: 15px auto;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .cardx h5 {
            font-weight: 600;
            margin-bottom: 15px;
            color: #0f172a;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 8px;
        }

        .form-control, .form-select {
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            padding: 10px;
        }

        .perfil-img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #1e3c72;
        }

        .badge-oficio {
            background: #1e3c72;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: inline-block;
        }

        .badge-verificado {
            background: #10b981;
            color: white;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 0.75rem;
            margin-left: 5px;
        }

        .gal img {
            width: 100%;
            height: 90px;
            object-fit: cover;
            border-radius: 12px;
            margin-top: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .nav-inferior {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 12px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        .nav-btn {
            border: none;
            background: none;
            font-size: 1.5rem;
            padding: 5px 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .nav-btn:hover {
            transform: scale(1.1);
        }

        .btn-custom {
            border-radius: 12px;
            padding: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="hero">
        <h2>🛠️ Soluciones Locales</h2>
        <p class="text-white-50">Encuentra profesionales de confianza en tu zona</p>
    </div>

    <div class="cardx">
        <h5>🔍 Buscar Profesional</h5>
        <div class="mb-3">
            <label class="form-label font-weight-bold">¿Qué oficio buscas?</label>
            <select id="oficio" class="form-select"></select>
        </div>
        <div class="mb-3">
            <label class="form-label">¿En qué ciudad?</label>
            <select id="ciudad" class="form-select"></select>
        </div>
        <button onclick="buscar()" class="btn btn-primary w-100 btn-custom">Buscar Ahora</button>
    </div>

    <div id="resultados" class="container"></div>

    <div id="seccion-publicar" class="cardx">
        <h5>💼 Publicar mi Servicio</h5>
        <form id="form">
            <input name="nombre" class="form-control mb-2" placeholder="Nombre" required>
            <input name="apellido" class="form-control mb-2" placeholder="Apellido" required>
            <input name="telefono" class="form-control mb-2" placeholder="Teléfono (Ej: 0981xxxxxx)" required>

            <label class="form-label mt-2 mb-1">Tu Ubicación y Rubro:</label>
            <select name="ciudad" id="ciudad2" class="form-select mb-2"></select>
            <select name="oficio" id="oficio2" class="form-select mb-2"></select>

            <textarea name="descripcion" class="form-control mb-3" placeholder="Describe brevemente los trabajos que realizas..." rows="3" required></textarea>

            <div class="mb-2">
                <label class="form-label">Foto de Perfil:</label>
                <input type="file" name="perfil" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Fotos de tus Trabajos (Máx 3):</label>
                <input type="file" name="trabajos" multiple class="form-control">
            </div>

            <button class="btn btn-success w-100 btn-custom">Registrarme Gratis 🚀</button>
        </form>
    </div>

    <div class="nav-inferior">
        <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="nav-btn">🏠</button>
        <button onclick="document.getElementById('seccion-publicar').scrollIntoView({behavior: 'smooth'})" class="nav-btn">➕</button>
    </div>

    <script>
        async function init(){
            try {
                let o = await (await fetch("/categorias")).json();
                let c = await (await fetch("/ciudades")).json();

                oficio.innerHTML = `<option value="">Todos los oficios</option>` + o.map(x=>`<option>${x}</option>`).join("");
                ciudad.innerHTML = `<option value="">Todas las ciudades</option>` + c.map(x=>`<option>${x}</option>`).join("");
                
                oficio2.innerHTML = o.map(x=>`<option>${x}</option>`).join("");
                ciudad2.innerHTML = c.map(x=>`<option>${x}</option>`).join("");
            } catch(e) {
                console.error("Error cargando datos iniciales", e);
            }
        }

        async function buscar(){
            let resDiv = document.getElementById("resultados");
            resDiv.innerHTML = `<div class="text-center my-3"><div class="spinner-border text-light" role="status"></div></div>`;
            
            try {
                let r = await (await fetch(`/buscar?oficio=${oficio.value}&ciudad=${ciudad.value}`)).json();
                resDiv.innerHTML = "";

                if(r.length === 0) {
                    resDiv.innerHTML = `<div class="cardx text-center"><p class="mb-0">No se encontraron profesionales disponibles.</p></div>`;
                    return;
                }

                r.forEach(x=>{
                    let checkVerificado = x.verificado ? `<span class="badge-verificado">✓ Verificado</span>` : '';
                    resDiv.innerHTML += `
                        <div class="cardx">
                            <div class="d-flex align-items-center mb-3">
                                <img src="${x.perfil || 'https://via.placeholder.com/70'}" class="perfil-img me-3">
                                <div>
                                    <h4 class="mb-0 h5">${x.nombre} ${checkVerificado}</h4>
                                    <span class="badge-oficio mt-1">${x.oficio}</span>
                                </div>
                            </div>
                            <p class="mb-2"><strong>Descripción:</strong> ${x.descripcion}</p>
                            <p class="mb-2">📍 <strong>Ciudad:</strong> ${x.ciudad}</p>
                            <p class="mb-3">⭐ <strong>Rating:</strong> ${x.rating}</p>

                            <a class="btn btn-success w-100 btn-custom" href="https://wa.me/${x.telefono}" target="_blank">
                                💬 Contactar por WhatsApp
                            </a>

                            <div class="row gal">
                                ${x.imagenes.filter(i=>i).map(i=>`
                                    <div class="col-4"><img src="${i}"></div>
                                `).join("")}
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                resDiv.innerHTML = `<div class="cardx text-center text-danger"><p class="mb-0">Error al realizar la búsqueda.</p></div>`;
            }
        }

        form.onsubmit = async e=>{
            e.preventDefault();
            let fd = new FormData(form);
            await fetch("/register", {method:"POST", body:fd});
            alert("¡Tu servicio fue publicado con éxito! 🚀");
            form.reset();
            buscar();
        };

        init();
    </script>
</body>
</html>

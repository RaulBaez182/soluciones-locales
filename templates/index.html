<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Soluciones Locales</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
margin:0;
font-family:Arial;
background: linear-gradient(135deg,#0f172a,#1e3c72);
color:white;
}

.hero{
text-align:center;
padding:20px;
}

.cardx{
background:white;
color:black;
border-radius:18px;
padding:15px;
margin:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.perfil{
width:70px;
height:70px;
border-radius:50%;
object-fit:cover;
}

.badge{
background:#1e3c72;
color:white;
padding:5px 10px;
border-radius:10px;
}

.gal img{
width:100%;
height:85px;
object-fit:cover;
border-radius:10px;
}

.nav{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
}

button{
border-radius:12px !important;
}
</style>
</head>

<body>

<div class="hero">
<h2>🛠️ Soluciones Locales</h2>
<p>Marketplace de profesionales</p>
</div>

<div class="cardx">
<h5>🔍 Buscar</h5>

<select id="oficio" class="form-control mb-2"></select>
<select id="ciudad" class="form-control mb-2"></select>

<button onclick="buscar()" class="btn btn-primary w-100">Buscar</button>
</div>

<div id="resultados"></div>

<div class="cardx">
<h5>💼 Publicar servicio</h5>

<form id="form">

<input name="nombre" class="form-control mb-2" placeholder="Nombre">
<input name="apellido" class="form-control mb-2" placeholder="Apellido">
<input name="telefono" class="form-control mb-2" placeholder="Teléfono">

<select name="ciudad" id="ciudad2" class="form-control mb-2"></select>
<select name="oficio" id="oficio2" class="form-control mb-2"></select>

<textarea name="descripcion" class="form-control mb-2"></textarea>

<input type="file" name="perfil" class="form-control mb-2">
<input type="file" name="trabajos" multiple class="form-control mb-2">

<button class="btn btn-success w-100">Publicar</button>
</form>
</div>

<div class="nav">
<button onclick="scroll(0,0)">🏠</button>
<button onclick="document.getElementById('form').scrollIntoView()">➕</button>
</div>

<script>

async function init(){

let o = await (await fetch("/categorias")).json()
let c = await (await fetch("/ciudades")).json()

oficio.innerHTML = oficio2.innerHTML = o.map(x=>`<option>${x}</option>`).join("")
ciudad.innerHTML = ciudad2.innerHTML = c.map(x=>`<option>${x}</option>`).join("")
}

async function buscar(){

let r = await (await fetch(`/buscar?oficio=${oficio.value}&ciudad=${ciudad.value}`)).json()

resultados.innerHTML=""

r.forEach(x=>{

resultados.innerHTML += `
<div class="cardx">

<img src="${x.perfil}" class="perfil">
<h4>${x.nombre}</h4>

<span class="badge">${x.oficio}</span>
<p>${x.descripcion}</p>
<p>📍 ${x.ciudad}</p>
<p>⭐ ${x.rating}</p>

<a class="btn btn-success w-100"
href="https://wa.me/${x.telefono}">
💬 WhatsApp
</a>

<div class="row gal mt-2">
${x.imagenes.filter(i=>i).map(i=>`
<div class="col-4"><img src="${i}"></div>
`).join("")}
</div>

</div>
`
})

}

form.onsubmit = async e=>{
e.preventDefault()
let fd = new FormData(form)
await fetch("/register",{method:"POST",body:fd})
alert("Publicado 🚀")
form.reset()
}

init()
</script>

</body>
</html>

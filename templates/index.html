<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>

Soluciones Locales

</title>


<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">


<style>

body{

background:

linear-gradient(
135deg,
#0f172a,
#1e293b,
#2563eb
);

min-height:100vh;

color:white;

padding-bottom:80px;

}


.header{

padding:30px;

text-align:center;

}


.logo{

font-size:42px;

}


.cardx{

background:

rgba(
255,
255,
255,
0.95
);

color:black;

border-radius:24px;

padding:20px;

margin-top:20px;

box-shadow:

0 15px 40px
rgba(
0,
0,
0,
0.3
);

}


.perfil{

width:120px;

height:120px;

border-radius:50%;

object-fit:cover;

border:

5px solid
#2563eb;

}


.galeria{

display:flex;

gap:10px;

overflow:auto;

}


.galeria img{

width:150px;

height:150px;

object-fit:cover;

border-radius:16px;

}


.preview{

width:100px;

height:100px;

object-fit:cover;

border-radius:15px;

margin:5px;

}


button{

border-radius:14px !important;

}


input,
select,
textarea{

border-radius:12px !important;

}

</style>

</head>

<body>
<h1>CAMBIO DE PRUEBA</h1>

<div
class="container">


<div
class="header">

<div
class="logo">

🛠️

</div>

<h1>

Soluciones Locales

</h1>

<p>

Encontrá profesionales cerca tuyo

</p>

</div>



<div
class="cardx">

<h3>

Buscar Servicios

</h3>

<select
id="buscar_oficio"
class="form-control mb-2">

</select>


<select
id="buscar_ciudad"
class="form-control mb-3">

</select>


<button
onclick="buscar()"
class="btn btn-primary w-100">

Buscar

</button>

</div>




<div
class="cardx">

<h3>

Ofrecer Servicio

</h3>


<form
id="form">


<input
name="nombre"
placeholder="Nombre"
class="form-control mb-2"
required>


<input
name="apellido"
placeholder="Apellido"
class="form-control mb-2"
required>


<input
name="email"
type="email"
placeholder="Email"
class="form-control mb-2"
required>


<input
name="password"
type="password"
placeholder="Contraseña"
class="form-control mb-2"
required>


<input
name="telefono"
placeholder="WhatsApp"
class="form-control mb-2"
required>


<select
name="ciudad"
id="ciudad"
class="form-control mb-2">

</select>


<select
name="oficio"
id="oficio"
class="form-control mb-2">

</select>


<textarea
name="descripcion"
placeholder="Contanos sobre tu servicio"
class="form-control mb-2">

</textarea>



<label>

Foto Perfil

</label>


<input
type="file"
name="perfil"
id="perfil"
class="form-control">


<img
id="previewPerfil"
class="preview">


<br><br>


<label>

3 Fotos

</label>


<input
multiple
type="file"
name="trabajos"
id="trabajos"
class="form-control">


<div
id="previewTrabajos">

</div>


<button
class="btn btn-success w-100 mt-3">

Publicar

</button>

</form>

</div>



<div
id="resultados">

</div>


</div>



<script>


async function init(){

let o=
await fetch(
"/categorias"
)

o=
await o.json()


let c=
await fetch(
"/ciudades"
)

c=
await c.json()



for(
let s
of
[
buscar_oficio,
oficio
]
){

s.innerHTML=

o.map(

x=>

`<option>

${x}

</option>`

)

}



for(
let s
of
[
buscar_ciudad,
ciudad
]
){

s.innerHTML=

c.map(

x=>

`<option>

${x}

</option>`

)

}

}



perfil.onchange=

e=>{

previewPerfil.src=

URL.createObjectURL(

e.target.files[0]

)

}



trabajos.onchange=

e=>{

previewTrabajos.innerHTML=

""


for(

let f

of

e.target.files

){

previewTrabajos.innerHTML+=

`

<img
src="${URL.createObjectURL(f)}"
class="preview">

`

}

}



form.onsubmit=

async e=>{

e.preventDefault()

let fd=

new FormData(form)


await fetch(

"/register",

{

method:

"POST",

body:

fd

}

)


alert(

"Servicio publicado"

)

form.reset()

}



async function buscar(){

let r=

await fetch(

`/buscar?oficio=${buscar_oficio.value}&ciudad=${buscar_ciudad.value}`

)

r=

await r.json()


resultados.innerHTML=

""


r.forEach(

x=>{


resultados.innerHTML+=

`

<div class="cardx">

<div class="text-center">

<img
src="${x.perfil}"
class="perfil">

</div>

<h3>

${x.nombre}

</h3>

<p>

⭐

${x.estrellas}

</p>

<p>

❤️

${x.favoritos}

</p>

<p>

📍

${x.ciudad}

</p>

<p>

🛠️

${x.oficio}

</p>

<p>

${x.descripcion}

</p>

<a
target="_blank"
href="https://wa.me/${x.telefono}"
class="btn btn-success">

WhatsApp

</a>

<button

onclick="fav(${x.id})"

class="btn btn-danger">

❤️

</button>


<div
class="galeria mt-3">

${

x.imagenes

.filter(

i=>i

)

.map(

i=>

`

<img
src="${i}">

`

)

.join(

""

)

}

</div>

</div>

`

}

)

}



async function fav(

id

){

await fetch(

"/favorito/"+id

)

buscar()

}



init()

</script>


</body>

</html>

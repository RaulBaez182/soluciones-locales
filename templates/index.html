<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soluciones Locales</title>
<style>
:root {
    --primary:#009688;
    --primary-dark:#00796B;
    --bg:#EAEAEA;
    --text:#333;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Arial;}
body{background:#1A252F;display:flex;justify-content:center;align-items:center;height:100vh;}

.phone-container{
    width:100%;
    max-width:410px;
    height:93vh;
    background:var(--bg);
    display:flex;
    flex-direction:column;
    border-radius:16px;
    overflow:hidden;
}

.header{
    background:var(--primary);
    color:#fff;
    padding:15px;
    font-weight:bold;
    display:flex;
    align-items:center;
}

.back-btn{
    display:none;
    margin-right:10px;
    background:none;
    border:none;
    color:#fff;
}

.content{
    flex:1;
    overflow:auto;
    padding:15px;
    padding-bottom:70px;
}

.view{display:none;}
.view.active{display:block;}

.home-btn{
    width:100%;
    padding:15px;
    margin:10px 0;
    background:var(--primary);
    color:#fff;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

.category-item{
    padding:10px;
    background:#fff;
    margin:5px 0;
    border-radius:8px;
    cursor:pointer;
}

.worker-card{
    background:#fff;
    padding:10px;
    margin:8px 0;
    border-radius:10px;
    cursor:pointer;
}

.worker-img{
    width:50px;height:50px;border-radius:50%;
}

.profile-card{
    background:#fff;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

.profile-img{
    width:100px;height:100px;border-radius:50%;
}
</style>
</head>

<body>

<div class="phone-container">

<div class="header">
<button class="back-btn" id="backBtn" onclick="back()">←</button>
<span id="title">Soluciones Locales</span>
</div>

<div class="content">

<!-- HOME -->
<div id="home" class="view active">
<button class="home-btn" onclick="showCats()">🔍 Contratar</button>
<button class="home-btn" onclick="showForm()">💼 Ofrecer servicio</button>
</div>

<!-- CATEGORIAS -->
<div id="cats" class="view"></div>

<!-- LISTA -->
<div id="list" class="view"></div>

<!-- PERFIL -->
<div id="profile" class="view"></div>

<!-- FORM -->
<div id="form" class="view">
<input id="nombre" placeholder="Nombre"><br><br>
<input id="apellido" placeholder="Apellido"><br><br>
<input id="telefono" placeholder="Telefono"><br><br>
<input id="ciudad" placeholder="Ciudad"><br><br>
<input id="oficio" placeholder="Oficio"><br><br>
<textarea id="desc" placeholder="Descripcion"></textarea><br><br>
<button onclick="enviar()">Publicar</button>
</div>

</div>
</div>

<script>

const API = "https://TU-BACKEND.onrender.com";

function show(id){
document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function showCats(){
show('cats');
document.getElementById("title").innerText="Categorias";

document.getElementById("cats").innerHTML=`
<div class="category-item" onclick="buscar('Plomero')">Plomero</div>
<div class="category-item" onclick="buscar('Electricista')">Electricista</div>
<div class="category-item" onclick="buscar('Albañil')">Albañil</div>
<div class="category-item" onclick="buscar('Carpintero')">Carpintero</div>
`;
}

async function buscar(oficio){
show('list');
document.getElementById("title").innerText="Resultados";

const res = await fetch(API+"/buscar?oficio="+oficio);
const data = await res.json();

document.getElementById("list").innerHTML =
data.map(d=>`
<div class="worker-card" onclick='ver(${JSON.stringify(d)})'>
<img class="worker-img" src="${d.perfil_url}">
<b>${d.nombre}</b><br>
${d.oficio} - ${d.ciudad}
</div>
`).join("");
}

function ver(d){
show('profile');

document.getElementById("title").innerText="Perfil";

document.getElementById("profile").innerHTML=`
<div class="profile-card">
<img class="profile-img" src="${d.perfil_url}">
<h3>${d.nombre}</h3>
<p>${d.oficio}</p>
<p>${d.descripcion}</p>

<a href="tel:${d.telefono}">📞 Llamar</a>
</div>
`;
}

function showForm(){
show('form');
document.getElementById("title").innerText="Publicar";
}

async function enviar(){
await fetch(API+"/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
nombre:document.getElementById("nombre").value,
apellido:document.getElementById("apellido").value,
telefono:document.getElementById("telefono").value,
ciudad:document.getElementById("ciudad").value,
oficio:document.getElementById("oficio").value,
descripcion:document.getElementById("desc").value
})
});

alert("Publicado");
show('home');
}

function back(){
show('home');
document.getElementById("title").innerText="Soluciones Locales";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soluciones Locales</title>
</head>
<body>

    <form id="form-registro" enctype="multipart/form-data">
        <label>Elige tu Oficio</label>
        <select id="reg-oficio" name="oficio" required>
            <option value="">Cargando oficios...</option>
        </select>
        
        <button type="submit">Registrarme</button>
    </form>

    <script>
        // Función que descarga la lista de 100+ oficios y llena el menú
        async function cargarOficios() {
            const select = document.getElementById('reg-oficio');
            try {
                const res = await fetch('/categorias');
                const data = await res.json();
                
                select.innerHTML = '<option value="">-- Selecciona un oficio --</option>';
                data.forEach(oficio => {
                    let opt = document.createElement('option');
                    opt.value = oficio;
                    opt.textContent = oficio;
                    select.appendChild(opt);
                });
            } catch(e) {
                console.error("Error cargando oficios:", e);
                select.innerHTML = '<option>Error al cargar</option>';
            }
        }
        
        // Ejecutar al cargar la página
        window.onload = cargarOficios;
    </script>
</body>
</html>
</body>
</html>
